name: Compile Unreal Engine GPU Benchmark Executables

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------
  # COMPILE UNREAL ENGINE 4 GAME EXE
  # -------------------------------------------------------------
  build-ue4:
    name: Compile UE4 Benchmark EXE
    runs-on: [self-hosted, windows] # Self-hosted runner with UE4 installed is required
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Build and Package UE4 Executable
      run: |
        echo "Starting compiling process via Unreal Automation Tool..."
        # Calls the native packaging engine
        & "${env:UE4_ROOT}\Engine\Build\BatchFiles\RunUAT.bat" BuildCookRun `
          -project="${{ github.workspace }}\UE4_Project\Benchmark.uproject" `
          -targetplatform=Win64 `
          -clientconfig=Shipping `
          -build -cook -stage -archive `
          -archivedirectory="${{ github.workspace }}\dist\UE4"

    - name: Upload Real UE4 Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ue4-benchmark-exe
        path: dist/UE4/WindowsNoEditor/

  # -------------------------------------------------------------
  # COMPILE UNREAL ENGINE 5 GAME EXE
  # -------------------------------------------------------------
  build-ue5:
    name: Compile UE5 Benchmark EXE
    runs-on: [self-hosted, windows] # Self-hosted runner with UE5 installed is required
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Build and Package UE5 Executable
      run: |
        echo "Starting compiling process via Unreal Automation Tool..."
        # Calls the modern UE5 compilation toolchain (Nanite/Lumen support)
        & "${env:UE5_ROOT}\Engine\Build\BatchFiles\RunUAT.bat" BuildCookRun `
          -project="${{ github.workspace }}\UE5_Project\Benchmark.uproject" `
          -targetplatform=Win64 `
          -clientconfig=Shipping `
          -build -cook -stage -archive `
          -archivedirectory="${{ github.workspace }}\dist\UE5"

    - name: Upload Real UE5 Executable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ue5-benchmark-exe
        path: dist/UE5/Windows/
